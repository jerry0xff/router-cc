name: Build macOS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.3
          run_install: false

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: macos-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: macos-pnpm-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-aarch64-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-aarch64-rust-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS Apple Silicon, no signing)
        run: |
          pnpm tauri build --bundles dmg,app --target aarch64-apple-darwin \
            --config '{"bundle":{"createUpdaterArtifacts":false},"plugins":{"updater":{"pubkey":""}}}'
        env:
          APPLE_SIGNING_IDENTITY: '-'

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          VER=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-assets/CC-Switch_${VER}_aarch64.dmg"
            echo "DMG: $DMG"
          fi
          APP_DIR=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            tar -czf "release-assets/CC-Switch_${VER}_aarch64.app.tar.gz" \
              -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"
            echo "App bundle archived"
          fi
          ls -lh release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CC-Switch-macOS-aarch64
          path: release-assets/*
          if-no-files-found: error
